# Release workflow — generated by .dev-kit/ci/scaffold.sh
# Source: .dev-kit/ci/templates/release.yml
# Creates a GitHub release when a version tag is pushed.
#
# Tag format: v1.2.3

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch .dev-kit submodule
        if: hashFiles('.gitmodules') != ''
        env:
          DEVKIT_DEPLOY_KEY: ${{ secrets.DEVKIT_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEVKIT_DEPLOY_KEY" > ~/.ssh/devkit_key
          chmod 600 ~/.ssh/devkit_key
          GIT_SSH_COMMAND="ssh -i ~/.ssh/devkit_key -o StrictHostKeyChecking=accept-new" \
            git submodule update --init --recursive
          rm ~/.ssh/devkit_key

      - name: Build
        run: make build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
