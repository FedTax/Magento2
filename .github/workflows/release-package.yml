name: Build Marketplace Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v1.1.1)'
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Build Marketplace zip
        id: build
        run: |
          FILENAME="taxcloud_magento2-${{ steps.tag.outputs.version }}.zip"
          git archive --format=zip HEAD -o "$FILENAME"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" "${{ steps.build.outputs.filename }}" --clobber
