# CI workflow — generated by .dev-kit/ci/scaffold.sh
# Source: .dev-kit/ci/templates/ci.yml
# Runs lint, test, and build on every push and pull request.
#
# Relies on standard Make targets from .dev-kit/mk/common.mk.
# Customize behavior by defining _lint, _test, _build in your Makefile.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch .dev-kit submodule
        if: hashFiles('.gitmodules') != ''
        env:
          DEVKIT_DEPLOY_KEY: ${{ secrets.DEVKIT_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEVKIT_DEPLOY_KEY" > ~/.ssh/devkit_key
          chmod 600 ~/.ssh/devkit_key
          GIT_SSH_COMMAND="ssh -i ~/.ssh/devkit_key -o StrictHostKeyChecking=accept-new" \
            git submodule update --init --recursive
          rm ~/.ssh/devkit_key

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
